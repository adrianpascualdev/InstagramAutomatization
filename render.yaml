services:
  - type: web
    name: instagram-scheduler
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: IG_USER_ID
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TZ
        value: Europe/Madrid
